<img alt="Shortcut Favicon Preview" class="w-8 h-8 object-contain opacity-30 grayscale invert" data-alt="A clean and modern UI preview of a squircle-shaped icon box. The center of the box features a website favicon. The aesthetic is extremely high-end, utilizing soft ambient shadows and light-mode pastel surfaces to create a professional web dashboard feeling. The background is a soft off-white grid." id="favicon-preview" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCq_b-lmMCYTO8Es24S9fQJR7AiVQJIcohdamkjiPeCDzuKxeLUrYzF8zqI7T5GePCDJsGeVHnt6sA4lrOYOwZ9qjqoU2ZjTQk__zwI9cOk8_VWu7IOxurAULHN7vWegoCpZDL7I65hTBota2kBtNLcQtAyZUgSR-dyKqynKURBcKrhzqnXW1YJbmQXKDsU_3DDEW4xR9ulBvEx5R-8l4Js0NnT6vnjCcw-PiDfFwGoGi1rjbb2HWP1RbayaH2TexmkCnnT_P98RXM"/>
</div>

<span class="absolute top-4 right-4 text-[10px] uppercase tracking-widest text-outline font-bold">Preview</span>

<div class="space-y-6">

<div class="space-y-2">
<label class="block font-label-sm text-label-sm text-outline uppercase tracking-wider" for="shortcut-url">Link URL</label>

<input class="w-full bg-surface-container border-outline-variant rounded-xl px-4 py-3 text-body-md font-body-md text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none placeholder:text-outline/50" id="shortcut-url" oninput="updatePreview()" placeholder="https://example.com" type="url"/>

<!-- INTERACTION SCRIPT -->
<script>
        function updatePreview() {
            const urlInput = document.getElementById('shortcut-url');
            const nameInput = document.getElementById('shortcut-name');
            const faviconImg = document.getElementById('favicon-preview');
            const namePreview = document.getElementById('name-preview');

            // Update Name Preview
            namePreview.innerText = nameInput.value || "New Shortcut";

            // Update Icon Preview Logic
            if (urlInput.value && urlInput.value.includes('.')) {
                try {
                    let domain = urlInput.value;
                    if (!domain.startsWith('http')) domain = 'https://' + domain;
                    const url = new URL(domain);
                    const hostname = url.hostname;
                    faviconImg.src = `https://www.google.com/s2/favicons?domain=${hostname}&sz=128`;
                    faviconImg.classList.remove('opacity-30', 'grayscale', 'invert');
                    faviconImg.classList.add('opacity-100');
                } catch (e) {
                    // Fallback for invalid URL typing
                    faviconImg.classList.add('opacity-30', 'grayscale', 'invert');
                }
            } else {
                faviconImg.classList.add('opacity-30', 'grayscale', 'invert');
            }
        }
    </script>
